openapi: 3.0.0
info:
  title: Comics Server API
  description: API для управления комиксами и пользователями
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Локальный сервер разработки

tags:
  - name: Authentication
    description: Аутентификация и регистрация пользователей
  - name: Users
    description: Операции с пользователями
  - name: Comics
    description: Управление комиксами

paths:
  /health:
    get:
      tags:
        - System
      summary: Проверка работоспособности сервера
      responses:
        '200':
          description: Сервер работает
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  database:
                    type: string
        '500':
          description: Ошибка сервера
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  database:
                    type: string
                  error:
                    type: string

  /api/user/auth:
    post:
      tags:
        - Authentication
      summary: Аутентификация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
              properties:
                login:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  token:
                    type: string
        '400':
          description: Не указаны логин или пароль
        '404':
          description: Пользователь не найден
        '401':
          description: Неверный пароль
        '500':
          description: Ошибка сервера

  /api/user/register:
    post:
      tags:
        - Authentication
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
                - name
              properties:
                login:
                  type: string
                password:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  token:
                    type: string
        '400':
          description: Не указаны обязательные поля
        '409':
          description: Пользователь уже существует
        '500':
          description: Ошибка сервера

  /api/user:
    get:
      tags:
        - Users
      summary: Получение информации о текущем пользователе
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: object
                    properties:
                      id:
                        type: string
                      login:
                        type: string
                      password:
                        type: string
                      name:
                        type: string
        '401':
          description: Пользователь не авторизован

  /api/comics:
    get:
      tags:
        - Comics
      summary: Получение списка всех комиксов
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список комиксов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    text:
                      type: string
                    description:
                      type: string
                    image:
                      type: string
                      format: byte
        '500':
          description: Ошибка сервера

    post:
      tags:
        - Comics
      summary: Создание нового комикса
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - comic
              properties:
                comic:
                  type: object
                  properties:
                    id:
                      type: string
                    text:
                      type: string
                    description:
                      type: string
                    pages:
                      type: array
                      items:
                        type: object
                        properties:
                          pageId:
                            type: string
                          comicsId:
                            type: string
                          number:
                            type: integer
                          rows:
                            type: integer
                          columns:
                            type: integer
                          images:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                cellIndex:
                                  type: integer
                                image:
                                  type: string
                                  format: byte
      responses:
        '200':
          description: Комикс успешно создан
        '400':
          description: Неверные входные данные
        '401':
          description: Пользователь не авторизован
        '500':
          description: Ошибка сервера

  /api/comics/{id}:
    get:
      tags:
        - Comics
      summary: Получение информации о конкретном комиксе
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Информация о комиксе
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  text:
                    type: string
                  description:
                    type: string
                  creator:
                    type: string
                  pages:
                    type: array
                    items:
                      type: object
                      properties:
                        pageId:
                          type: string
                        number:
                          type: integer
                        rows:
                          type: integer
                        columns:
                          type: integer
                        images:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              cellIndex:
                                type: integer
                              image:
                                type: string
                                format: byte
        '404':
          description: Комикс не найден
        '500':
          description: Ошибка сервера

    put:
      tags:
        - Comics
      summary: Обновление комикса
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - comic
                - pages
              properties:
                comic:
                  type: object
                  properties:
                    text:
                      type: string
                    description:
                      type: string
                pages:
                  type: array
                  items:
                    type: object
                    properties:
                      pageId:
                        type: string
                      number:
                        type: integer
                      rows:
                        type: integer
                      columns:
                        type: integer
                      images:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            cellIndex:
                              type: integer
                            image:
                              type: string
                              format: byte
      responses:
        '200':
          description: Комикс успешно обновлен
        '400':
          description: Неверные входные данные
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав для редактирования
        '404':
          description: Комикс не найден
        '500':
          description: Ошибка сервера

    delete:
      tags:
        - Comics
      summary: Удаление комикса
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Комикс успешно удален
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав для удаления
        '404':
          description: Комикс не найден
        '500':
          description: Ошибка сервера

  /api/mycomics:
    get:
      tags:
        - Comics
      summary: Получение списка комиксов текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список комиксов пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        text:
                          type: string
                        description:
                          type: string
                        creator:
                          type: string
        '500':
          description: Ошибка сервера

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
